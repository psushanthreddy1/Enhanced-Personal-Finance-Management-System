{% extends "base.html" %}

{% block content %}

<h2>Expense Prediction</h2>

<h3>Next Month Expected Expense</h3>

<h1 style="color:orange">
₹ {{ prediction }}
</h1>

<div style="width:100%; max-width:1400px; height:600px;">
    <canvas id="forecastChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const months = {{ months | tojson }};
const expense = {{ expense | tojson }};

new Chart(document.getElementById("forecastChart"), {
    type: "line",
    data: {
        labels: months,
        datasets: [{
            label: "Monthly Expenses",
            data: expense,
            borderColor: "orange",
            fill:false
        }]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false
    }
});

</script>

{% endblock %}
