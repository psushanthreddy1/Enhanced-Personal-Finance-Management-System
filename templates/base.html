<!DOCTYPE html>
<html lang="en">
<head>
  <title>{% block title %}MoneyMap{% endblock %}</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial;
      color: white;
    }
    /* ✅ Sidebar */
    .sidebar {
      width: 260px;
      height: 100vh;
      background: #000;
      position: fixed;
      padding: 20px;
      overflow-y: auto;
    }

    .sidebar h3 {
      font-weight: bold;
      margin-bottom: 30px;
    }

    .sidebar p {
      font-size: 12px;
      color: gray;
      margin-top: 25px;
    }

    .sidebar a {
      display: block;
      padding: 12px;
      margin: 6px 0;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-size: 15px;
    }

    .sidebar a:hover {
      background: orange;
      color: black;
    }
    .sidebar .section-title {
    font-size: 12px;
    color: #666;
    margin: 25px 0 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: normal;
}
    .active-link {
      background: orange;
      color: black !important;
      font-weight: bold;
    }

    /* Content */
    .content {
      margin-left: 280px;
      padding: 20px;
    }

    .main-box {
      display: flex;
      height: 92vh;
      background: #1b1b1b;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">

  <h3>Money Map</h3>

  <!-- Overview -->
  <a href="/">🏠 Overview</a>

  <!-- Transaction Section -->
  <p>TRANSACTION DATA</p>
  <a href="/transactions">📄 Transaction Details</a>
  <a href="/analysis">📊 Statistics & Analysis</a>
  <a href="/forecast">🔮 Prediction</a>
  

  <!-- Basis Data -->
  <p>BASIS DATA</p>
  <a href="/accounts">🏦 Accounts</a>
  <a href="/categories">📂 Transaction Categories</a>
  <a href="/budget">💰 Budget Planner</a>
  <a href="/alerts">🚨 Alerts</a>

</div>

<!-- ✅ Page Content -->
<div class="content">
  {% block content %}{% endblock %}
</div>

</body>
</html>
